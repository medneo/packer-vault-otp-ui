version: '3'
# Default: HTTP only. ALB terminates TLS and forwards HTTP to port 8080.
# Health check: GET /healthz returns 200. ALB target group must use path /healthz.
# Hostnames: vault-otp-ui.medneo.com, vault-otp-ui.beyond-imaging.com (configure in ALB/DNS)
# Logging: awslogs driver - logs go directly to CloudWatch. LOG_GROUP and AWS_REGION from .env (set by user_data).
services:
  healthz:
    image: nginx:alpine
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: ${LOG_GROUP}
        awslogs-region: ${AWS_REGION}
        awslogs-stream-prefix: healthz
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - ./nginx-healthz.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vault_otp_ui

  vault_otp_ui:
    image: medneo-docker.jfrog.io/vault-otp-ui:1.0.0
    logging:
      driver: awslogs
      options:
        awslogs-group: ${LOG_GROUP}
        awslogs-region: ${AWS_REGION}
        awslogs-stream-prefix: vault_otp_ui
    expose:
      - "8080"
    environment:
      - VAULT_ADDR=https://secret-manager.medneo.com
    restart: unless-stopped